site_name: OmniSkill
site_description: Unified skill infrastructure for AI agents in Go
site_url: https://plexusone.dev/omniskill
repo_url: https://github.com/plexusone/omniskill
repo_name: plexusone/omniskill

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Concepts:
    - Overview: concepts/overview.md
    - Skills: concepts/skills.md
    - Tools: concepts/tools.md
    - Registry: concepts/registry.md
  - MCP:
    - Server: mcp/server.md
    - Client: mcp/client.md
    - OAuth2: mcp/oauth2.md
  - API Reference: api/index.md
